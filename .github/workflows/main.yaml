name: main

on:
  pull_request:
  push:
    branches: ["**"]
    tags: ["*.*.*"]

env:
  AUBE_ALLOWED_UNPOPULAR_PACKAGES: pglite-cli

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
          experimental: true
          log_level: ${{ runner.debug == '1' && 'trace' || 'info' }}
      - run: mise build && mise check
        env:
          MISE_LOG_LEVEL: ${{ runner.debug == '1' && 'trace' || 'info' }}

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
          experimental: true
          log_level: ${{ runner.debug == '1' && 'trace' || 'info' }}
      - run: mise test
        env:
          MISE_LOG_LEVEL: ${{ runner.debug == '1' && 'trace' || 'info' }}
          LOGTAPE_TEST_MODE: ${{ runner.debug == '1' && 'always' || 'on-failure' }}
          LOGTAPE_TEST_LOWEST_LEVEL: ${{ runner.debug == '1' && 'trace' || 'debug' }}
